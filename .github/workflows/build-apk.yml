name: Build Android APK (Capacitor)

on:
  push:
    branches:
      - main
      - feature/apk-pipeline
      - 02-06-final
  workflow_dispatch:

jobs:
  build:
    name: Build and Sign APK
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create empty web assets directory for Capacitor
        run: mkdir -p out

      - name: Add Android Platform Overlay
        run: |
          npx cap add android
          npx cap sync android

      - name: Add Location Permission to AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Add location permissions before the closing </manifest> tag
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' "$MANIFEST"
          cat "$MANIFEST"

      - name: Build Android App (Assemble Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # Optional/conditional release build if secrets are present
      - name: Build Release APK (Assemble Release)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign Release APK
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Signed Release APK Artifact
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
          retention-days: 7
